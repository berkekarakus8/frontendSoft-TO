<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css"
    />
</head>

<body class="bg-gray-100 flex items-center justify-center min-h-screen">

  <div class="bg-white p-6 rounded-xl shadow max-w-md w-full">

    <h1 class="text-xl font-bold mb-4 text-center">
      Relative
    </h1>


    <div class="relative bg-blue-100 h-24 rounded mb-3">
      <div class="relative top-4 bg-blue-600 text-white text-xs p-2 w-fit rounded">
        top-4=asagıya kaydırır
      </div>
    </div>

  
    <div class="relative bg-green-100 h-24 rounded mb-3">
      <div class="relative left-4 bg-green-600 text-white text-xs p-2 w-fit rounded">
        left-4=saga kaydırır 
      </div>
    </div>


    <div class="relative bg-purple-100 h-24 rounded mb-3">
      <div class="relative right-4 bg-purple-600 text-white text-xs p-2 w-fit rounded">
        right-4= sola kaydirir
      </div>
    </div>

  
    <div class="relative bg-yellow-100 h-24 rounded mb-3">
      <div class="relative inset-4 bg-yellow-500 text-white text-xs p-2 w-fit rounded">
        inset-4 = ?
      </div>
    </div>


    <div class="relative bg-gray-200 h-24 rounded">
      <div class="relative z-10 bg-red-500 text-white text-xs p-2 w-fit rounded">
        <!-- w fit otomatik content kadar alan kaplar tum satır degil -->
         z-10 = katman olarak ne kadar ustte gorunecegi
      </div>
    </div>

  </div>

</body>
</html>
