<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <div>
        <h1>Spread operator( dagıtma)</h1>
    </div><br><br>
    <div>
        <h3>dizi kopyalama referans</h3>
        <div>
            <button id="btn-copy-ref">referans kopyalama</button>
            <button id="btn-copy-spread">spread kopyalama (guvenli)</button>
        </div>
    </div><br><br>
    <div>
        <span>orjinal dizi</span>
        <div id="orig-arr">[]</div>
    </div><br>
    <div>
        <span>kopya dizi</span>
        <div id="copy-arr">[]</div>
    </div>
<br><br>
    <div>
        <h3>2.nesne birlestirme</h3>
        <button id="btn-merge-obj">Nesne birlestirme</button>
        <div id="merge-result">
            Nesne birlestieme
        </div>
    </div><br><br>

    <script>
        let orijinal=['Apple','Microsoft'];

        document.getElementById('orig-arr').innerText=JSON.stringify(orijinal);

        document.getElementById('btn-copy-ref').addEventListener('click',()=>{
            orijinal=['Apple','Microsoft'];
            const kopya=orijinal;
            kopya.push('Nokia');
            document.getElementById('orig-arr').innerText=JSON.stringify(orijinal);
            document.getElementById('copy-arr').innerText=JSON.stringify(kopya);

        })

        document.getElementById('btn-copy-spread').addEventListener('click',()=>{
            orijinal=['Elma','Armut'];
            const kopya =[...orijinal];
            kopya.push('Kiraz');
            document.getElementById('orig-arr').innerText=JSON.stringify(orijinal);
            document.getElementById('copy-arr').innerText=JSON.stringify(kopya);
        })

        document.getElementById('btn-merge-obj').addEventListener('click',()=>{
            const varsayilan={tema:'koyu',dil:'TR'};
            const kullanici={dil:'EN'};
            const sonNesne={...varsayilan,...kullanici};
            document.getElementById('merge-result').innerHTML=`<div>Olusan Nesne:${JSON.stringify(sonNesne)}</div>`
        })

    </script>
</body>
</html>
