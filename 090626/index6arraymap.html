<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <center>
    <div>
        <h1>map() ve filter() dizi methodları</h1>
    </div><hr>
    <div>
        <label>urun arama</label>
        <input type="text" id="input-search">
    </div><br>
    <div>
        <label>Maksimumn fiuyat</label>
        <input type="number" id="input-price-limit" value="50000">
    </div><br>
    <div>
        <button id="btn-filter">filtrele</button>
    </div>
    <div>
        <h3>urun listesi</h3>
        <div id="products-list"></div>
    </div>


    <script>
        const products=[
            {id:1,ad:'Iphone 17 pro max',fiyat:110000},
            {id:2,ad:'Iphone 16 pro max',fiyat:10000},
            {id:3,ad:'Iphone 15 pro max',fiyat:45869},
            {id:4,ad:'Iphone 14 pro max',fiyat:33333},
            {id:5,ad:'Iphone 13 pro max',fiyat:11099},
        ]

        const listele=()=>{
            const arama=document.getElementById('input-search').value.toLowerCase();
            const limit= parseFloat(document.getElementById('input-price-limit').value)|| 99999;

            const filtrelenmis=products.filter(product=>{
                return product.ad.toLowerCase().includes(arama)&& product.fiyat <= limit;
            })



            const kartlarHTML=filtrelenmis.map(product=>`
            <div>
                <span>${product.ad}</span>
                <span>${product.fiyat}</span>
                </div>
            `).join('');

                document.getElementById('products-list').innerHTML=kartlarHTML || `<div></div>`;


        };
        document.getElementById('btn-filter').addEventListener('click',listele);
        listele();



    </script>




    </center>
</body>
</html>
