<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css"
    />
</head>
<body class="text-gray-500 font-bold">
    <header class="bg-gray shadow p-2 text-center">
        <!-- Tracking Wide=Harflerin arasını acr -->
        <h1 class="text-xl font-bold tracking wide">
            tracking odev
        </h1>
    </header>
    <main class="p-2">
        <div class="bg-gray rounded-2xl shadow hover:shadow-lg transition-colors">
                <p class="tracking-tighter text-lg">
                    Harfleri arsındki boslukları en en en minimum yapr
                </p>

            </h2>

        </div>


        <div class="bg-gray rounded-2xl shadow hover:shadow-lg transition-colors">
            <h2 class="text-xl font-semibold mb-2 tracking-tight ">
                Tracking tight = harflerin arasını daha da sıkıstırır
            </h2>
        </div>


        <div class="bg-gray rounded shadow p-2 ">
            <h2 class="text-lg font-bold mb-4">
                Tracking wider
            </h2>
            <p class="text-sm tracking-wider">
                Wide dan daha da bosluklu bir hal alır

            </p>

        </div>
        <div class="bg-gray rounded shadow p-2 transition-colors">
            <h2 class="mb-2 font-semibold text-xl">
                Tracking widest

            </h2>
            <p class="tracking-widest">
                En en en en en en genis aralık bırakan fonksiyon budur
            </p>


        </div>


    </main>
    
</body>
</html>
