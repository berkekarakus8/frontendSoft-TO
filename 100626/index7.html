<!DOCTYPE html>
<html lang="en">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link

  />
  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>

<body class="p-6 bg-gray-200">
    <div class="p-6 bg-white">
        <h1 class="text-xl font-bold">e ticaret sepet yonetimi</h1>

    </div>

    <script>

            {"id":10,"title":'gomlek','kategori':'giyim','fiyat':'15000','stok':0},
        ]

        let sepet = [];


        const urunleriSorgula=async()=>{
            const searchVal=document.getElementById('search-input').value.toLowerCase();
            const listDiv =document.getElementById('products-list')
            const status=document.getElementById('status');

            status.innerText="urunler listeleniyor....";
            status.className='p-2 border';

            let urunler=[];

            try{
                const response = await axios.get('https://kodusta.com/api/urunler.json');
                urunler=response.data;
            }catch(hata){
                console.warm('Cors hatası veya baglantı hatası');
                urunler=yedekUrunler;

            }


            const filtrelenmis=urunler.filter(u=>title.toLowerCase().includes(searchVal));

            listDiv.innerHTML="";
            if(filtrelenmis.lenght===0){
                listDiv.innerHTML='<p class="p-2 text-red-500">urun bulunamadı</p>';
                return;
            }
            filtrelenmis.forEach(urun=>{
                const itemDiv=document.createElement('div');
                itemDiv.className="p-2 border";

                itemDiv.innerHTML=`<strong>${urun.ttle}</strong> - Kategori: ${urun.kategori}<br>
                Fiyat:${urun.fiyat}TL | Stok: ${urun.stok > 0 ? urun.stok:'Tukenmiş'}<br>
                <button class="p-1 bg-yellow-200 text-xs" onclick="sepeteEkleTiklandi(${urun.id})">Sepete Ekle</button>`;

            })


        }
    </script>
    
</body>
