<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css"
  />
</head>
<body class="p-6 bg-gray-200">
    <div class="p-6 bg-white">
        <h1 class="text-xl font-bold">kullanıcı listesi fetch get</h1>
        <div class="mb-4">
            <input id="search-input" type="text" placeholder=",isim ile ara" class="p-2 border">
        </div>
        <button id="btn-load" class="p-2 bg-blue-200 mb-4">listeyi yukle</button>
        <ul id="user-list" class="list-disc pl-2 space-y-1">
            <li>henuz ali hocam yapmadı</li>
        </ul>
    </div>
    <script>
        let tumKullanicilar=[];
        const yedekKullanicilar=[
            {"id":1,'name':'Ali Yılmaz','email':'ali@gmail.com','sehir':'Corum'},
            {"id":2,'name':'Berke Yılmaz','email':'berke@gmail.com','sehir':'İstanbul'},
            {"id":3,'name':'Mehmet Yılmaz','email':'berke@gmail.com','sehir':'Ankara'},
            {"id":4,'name':'Can Yılmaz','email':'berke@gmail.com','sehir':'İzmir'},
        ];


        const listeyiCiz=(kullanicilar)=>{
            const listElement=document.getElementById('user-list');
            listElement.innerHTML='';
            if(kullanicilar.lenght === 0){
                listElement.innerHTML='<li>Eşlenen Kullanıcı Bulunmadı</li>';
                return;
            }

            kullanicilar.forEach(user=>{
                const li=document.createElement('li');
                li.innerHTML=`<strong>${user.name}</strong> - E-posta: ${user.email} (Şehir: ${user.sehir})`;
                listElement.appendChild(li);
            })

        }

        const kullanicilariYukle=async()=>{
            const listElement=document.getElementById('user-list');
            listElement.innerHTML='<li>kULLANICILAR YUKLENİYOR...</li>';

            try{
                const response=await fetch('https://kodusta.com/api/kullanicilar.json');
                if(!response.ok){
                    throw new Error('Sunucu hatası' + response.status);
                }
                tumKullanicilar= await response.json();

            }catch(hata){
                console.warn('CORS engeli veya baglanto hatası,Yedek veriler kullanılacak');
                tumKullanicilar=yedekKullanicilar;
            }
            listeyiCiz(tumKullanicilar);
        }

document.getElementById('search-input').addEventListener('input',(e)=>{
    const aramaKelimesi=e.target.value.toLowerCase();
    const filtrelenmis=tumKullanicilar.filter(user=>user.name.toLowerCase().includes(aramaKelimesi));
    listeyiCiz(filtrelenmis);
})        
document.getElementById('btn-load').addEventListener('click',kullanicilariYukle);
    </script>
    
</body>
</html>
