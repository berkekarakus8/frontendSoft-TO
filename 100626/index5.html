<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css"
  />
</head>
<body class="p-6 bg-gray-100">
    <div class="p-6 bg-white">
        <h1 class="text-xl font-bold">Async / Await</h1>
        <button id="btn-run" class="p-2 bg-pink-200">siparisi getir</button>
        <div id="result" class="mt-4 whitespace-pre-line">islem bekleniyor..........</div>
    </div>
    <script>
        const kullaniciyiGetir = ()=>{
            return new Promise((resolve)=>{
                setTimeout(()=>resolve({id:42,ad:'onur'}),1000);

            })
        }

        const sepetiGetir=(kullanici)=>{
            return new Promise((resolve)=>{
                setTimeout(()=>resolve({sahip:kullanici,ad,urunler:['Cep Telefonu','Macbook']}),1000);

            })
        }

        const faturaHesapla=(sepet)=>{
            return new Promise((resolve)=>{
                setTimeout:(()=>resolve(`Müşteri:${sepet.sahip})\nürünler:${sepet.urunler.join(' ,')}\nFatura Tutarı 2500 TL`),1000);
            })
        }
        const siparisSureciniYonet=async()=>{
            const output=document.getElementById('result');
            output.innerText='Surec baslatıldı.....'

            const kullanici=await kullaniciyiGetir();
            output.innerText=`Kullanıcı Alındı:${kullanici.ad}\nSepet Yukleniyor...`;

            const sepet=await sepetiGetir(kullanici);
            output.innerText=`Sepet Alındı:${sepet.urunler.join(' ,')}\nFatura Cıkarılıyor...`;

            const fatura=await faturaHesapla(sepet);
            output.innerText=fatura;
            

        }
        document.getElementById('btn-run').addEventListener('click',siparisSureciniYonet)
    </script>
    
</body>
</html>
