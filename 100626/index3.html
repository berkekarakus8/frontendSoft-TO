<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css"
  />
</head>
<body class="p-6 bg-gray-100">
    <div>
        <h1 class="text-xl font-bold">Giris Dogrulama</h1>
        <div class="mb-2">
            <input id="username" type="text" placeholder="Kullanıcı adı (admin)" class="p-2 border">
        </div>
        <div>
            <input type="password" id="password" placeholder="Sifre (1234)" class="p-2 border">
        </div>
        <button id="btn-login" class="p-2 bg-purple-200">giris yap</button>
        <div id="result" class="mt-4 p-2">lutfen giris yapın</div>
    </div>

    <script>
        const girisYap=(username,password)=>{
            return new Promise((resolve,reject)=>{
                if(username==='admin' && password==='1234'){
                    resolve({isim:'Ali Veli',rol:'Yonetici',girisZamani:new Date().toLocaleDateString()})
                }else{
                    reject('Hata:Kullanıcı adı ve sifre yanlıs')
                }
            })
        }

        document.getElementById('btn-login').addEventListener('click',()=>{
            const uName=document.getElementById('username').value;
            const uPass=document.getElementById('password').value;
            const output=document.getElementById('result');

            girisYap(uName,uPass).then((kullanici)=>{
                output.className='mt-4 bg-green-200';
                output.innerHTML=`<strong>Giris Basarılı!(Onaylandı)</strong><br>
                İsim:${kullanici.isim}<br>
                Rol:${kullanici.rol}<br>
                Giris zamanı:${kullanici.girisZamani}<br>`;
            }).catch((hataMesaji)=>{
                output.className='mt-4 bg-red-200';
                output.innerText=hataMesaji;
            })

        })
    </script>
    
</body>
</html>
